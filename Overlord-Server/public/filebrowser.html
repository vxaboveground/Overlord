<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>File Browser - Overlord</title>

    <link rel="stylesheet" href="/vendor/inter/600.css" />

<link rel="stylesheet" href="/assets/tailwind.css" />
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />

    <link rel="stylesheet" href="/assets/main.css" />

    <script defer src="/vendor/msgpackr/msgpackr.js"></script>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .file-item:hover {
        background-color: rgba(51, 65, 85, 0.5);
      }
      .file-item {
        position: relative;
      }
      .file-item.selected {
        background-color: rgba(59, 130, 246, 0.2);
        border-color: rgba(59, 130, 246, 0.4);
      }
      .file-checkbox {
        appearance: none;
        -webkit-appearance: none;
        position: absolute;
        left: 0;
        top: 0;
        width: 12px;
        height: 100%;
        border: none;
        border-radius: 0;
        background-color: rgba(100, 116, 139, 0.3);
        cursor: pointer;
        transition: all 0.2s ease;
        z-index: 1;
      }
      .file-checkbox:hover {
        background-color: rgba(100, 116, 139, 0.5);
      }
      .file-checkbox:checked {
        background-color: #3b82f6;
      }
      .file-checkbox:checked:hover {
        background-color: #2563eb;
      }
      .context-menu {
        display: none;
        position: fixed;
        z-index: 1000;
        background-color: #1e293b;
        border: 1px solid #334155;
        border-radius: 0.5rem;
        padding: 0.5rem 0;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
      }
      .context-menu.show {
        display: block;
      }
      .context-menu-item {
        padding: 0.5rem 1rem;
        cursor: pointer;
        whitespace: nowrap;
      }
      .context-menu-item:hover {
        background-color: #334155;
      }
      .breadcrumb-item {
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        border-radius: 0.25rem;
      }
      .breadcrumb-item:hover {
        background-color: rgba(51, 65, 85, 0.5);
      }
      .file-meta {
        display: none;
      }

      /* Mobile responsive styles */
      @media (max-width: 768px) {
        header {
          padding: 0.75rem;
        }
        header .flex {
          flex-wrap: nowrap;
          gap: 0.5rem;
        }
        header span,
        header a {
          font-size: 0.875rem;
        }
        #client-id-header {
          display: none;
        }
        main {
          padding: 1rem 0.5rem;
        }
        .file-header {
          display: none !important;
        }
        #file-list .file-item {
          display: flex;
          flex-direction: column;
          gap: 0.5rem;
          padding: 0.75rem !important;
        }
        #file-list .file-item > div {
          width: 100% !important;
        }
        #file-list .file-item .file-size-col,
        #file-list .file-item .file-modified-col {
          display: none;
        }
        .file-meta {
          display: flex;
          justify-content: space-between;
          font-size: 0.75rem;
          color: rgb(148 163 184);
          margin-top: 0.25rem;
        }
        .action-buttons {
          display: flex;
          gap: 0.5rem;
          width: 100%;
          justify-content: flex-end;
        }
        .action-buttons button {
          font-size: 0.875rem;
          padding: 0.5rem 0.75rem;
        }
      }

      /* File editor modal styles */
      .file-editor-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        display: none;
      }
      .file-editor-modal.show {
        display: flex;
      }
      .file-editor-content {
        background-color: #1e293b;
        border: 1px solid #334155;
        border-radius: 0.75rem;
        width: 90%;
        max-width: 1200px;
        height: 90vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
      }
      .file-editor-content > div:nth-child(3) {
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      #editor-textarea {
        font-family: "Courier New", monospace;
        font-size: 14px;
        line-height: 1.5;
        tab-size: 4;
        white-space: pre;
        color: #e2e8f0;
        background-color: #0f172a;
      }
      #editor-textarea::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }
      #editor-textarea::-webkit-scrollbar-track {
        background: #1e293b;
      }
      #editor-textarea::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 6px;
      }
      #editor-textarea::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
      #editor-preview {
        font-family: "Courier New", monospace;
        font-size: 14px;
        line-height: 1.5;
        tab-size: 4;
        white-space: pre;
        margin: 0;
        background-color: #0f172a;
        scrollbar-color: #1e293b #0f172a; /* Firefox */
        scrollbar-width: thin; /* Firefox */
      }
      #editor-preview::-webkit-scrollbar {
        width: 12px !important;
        height: 12px !important;
      }
      #editor-preview::-webkit-scrollbar-track {
        background: #0f172a !important;
      }
      #editor-preview::-webkit-scrollbar-thumb {
        background: #1e293b !important;
        border-radius: 6px;
      }
      #editor-preview::-webkit-scrollbar-thumb:hover {
        background: #334155 !important;
      }
      #editor-preview::-webkit-scrollbar-corner {
        background: #0f172a !important;
      }
      /* Ensure scrollbars on both axes */
      #editor-preview * {
        scrollbar-color: inherit !important;
        scrollbar-width: inherit !important;
      }
      #editor-preview code {
        background: transparent !important;
        padding: 0 !important;
      }
      .bulk-actions-bar {
        background-color: rgba(59, 130, 246, 0.15);
        border: 1px solid rgba(59, 130, 246, 0.4);
      }

      /* File preview modal styles */
      .file-preview-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.85);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2100;
      }
      .file-preview-modal.show {
        display: flex;
      }
      .file-preview-content {
        background-color: #1e293b;
        border: 1px solid #334155;
        border-radius: 0.75rem;
        width: 92%;
        max-width: 1100px;
        height: 90vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
        overflow: hidden;
      }
      #preview-content {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #0f172a;
        overflow: auto;
        padding: 1rem;
      }
      #preview-content img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        border-radius: 0.25rem;
      }
      #preview-content object {
        width: 100%;
        height: 100%;
        border: none;
      }

      /* Sidebar styles */
      .sidebar-item {
        position: relative;
        cursor: pointer;
      }
      .sidebar-item:hover {
        background-color: rgba(51, 65, 85, 0.7);
      }
      .sidebar-item.active {
        background-color: rgba(59, 130, 246, 0.15);
        color: #93c5fd;
      }
      .sidebar-item.active::before {
        content: '';
        position: absolute;
        left: 0;
        top: 4px;
        bottom: 4px;
        width: 3px;
        background-color: #3b82f6;
        border-radius: 0 2px 2px 0;
      }
      .sidebar-section-title {
        font-size: 0.65rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: rgb(100 116 139);
        padding: 0.5rem 0.75rem 0.25rem;
      }
      @media (max-width: 1023px) {
        #sidebar { display: none !important; }
      }
    </style>
    <script defer src="/assets/toast.js"></script>
    <script defer src="/assets/ripple.js"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header id="top-nav"></header>

    <main class="px-5 py-4">
      <div class="max-w-[1600px] mx-auto flex gap-4">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-52 flex-shrink-0 hidden lg:block">
          <div class="sticky top-6 flex flex-col gap-3">
            <div class="bg-slate-900/70 border border-slate-800 rounded-lg overflow-hidden">
              <div class="px-3 py-2.5 border-b border-slate-700/50 flex items-center gap-2">
                <i class="fa-solid fa-bookmark text-blue-400 text-xs"></i>
                <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Quick Access</span>
              </div>
              <div id="sidebar-content" class="p-1.5">
                <div class="text-xs text-slate-500 text-center py-4">Connecting...</div>
              </div>
            </div>
            <div class="bg-slate-900/70 border border-slate-800 rounded-lg overflow-hidden">
              <div class="px-3 py-2.5 border-b border-slate-700/50 flex items-center gap-2">
                <i class="fa-solid fa-hard-drive text-slate-400 text-xs"></i>
                <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Drives</span>
              </div>
              <div id="sidebar-drives" class="p-1.5">
                <div class="text-xs text-slate-500 text-center py-4">Connecting...</div>
              </div>
            </div>
          </div>
        </aside>
        <!-- Main Content -->
        <div class="flex-1 min-w-0 flex flex-col gap-4">
        <!-- Status Bar -->
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div class="flex items-center gap-2 flex-wrap">
            <span
              id="status-indicator"
              class="inline-flex items-center gap-2 px-3 py-2 rounded-full bg-slate-800 text-slate-300"
            >
              <i class="fa-solid fa-circle-notch fa-spin"></i> Connecting...
            </span>
            <span
              id="client-id-header"
              class="inline-flex items-center gap-2 px-3 py-2 rounded-full bg-slate-900/60 text-slate-200 border border-slate-800"
            >
              <i class="fa-solid fa-computer"></i>
              <span>Loading client...</span>
            </span>
          </div>
          <div class="flex items-center gap-2 flex-wrap">
            <button
              id="search-btn"
              class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-white"
              disabled
            >
              <i class="fa-solid fa-search"></i> Search
            </button>
            <button
              id="refresh-btn"
              class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white"
              disabled
            >
              <i class="fa-solid fa-refresh"></i> Refresh
            </button>
            <button
              id="upload-btn"
              class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-green-600 hover:bg-green-700 text-white"
              disabled
            >
              <i class="fa-solid fa-upload"></i> Upload File
            </button>
            <button
              id="mkdir-btn"
              class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-purple-600 hover:bg-purple-700 text-white"
              disabled
            >
              <i class="fa-solid fa-folder-plus"></i> New Folder
            </button>
          </div>
        </div>

        <!-- Search Bar (hidden by default) -->
        <div
          id="search-bar"
          class="hidden px-4 py-3 bg-slate-900/70 border border-slate-800 rounded-lg"
        >
          <div class="flex items-center gap-2">
            <i class="fa-solid fa-search text-slate-400"></i>
            <input
              type="text"
              id="search-input"
              placeholder="Search files or content..."
              class="flex-1 bg-transparent outline-none text-sm text-slate-100 placeholder:text-slate-500"
            />
            <label
              class="inline-flex items-center gap-2 text-sm text-slate-300"
            >
              <input
                type="checkbox"
                id="search-content-checkbox"
                class="rounded"
              />
              <span>Search in files</span>
            </label>
            <button
              id="search-execute-btn"
              class="inline-flex items-center px-3 py-1 rounded bg-blue-600 hover:bg-blue-700 text-white text-sm"
            >
              Search
            </button>
            <button
              id="search-close-btn"
              class="inline-flex items-center px-2 py-1 rounded hover:bg-slate-700 text-slate-400"
            >
              <i class="fa-solid fa-times"></i>
            </button>
          </div>
        </div>

        <!-- Bulk Actions Bar (hidden by default) -->
        <div
          id="bulk-actions-bar"
          class="hidden bulk-actions-bar px-4 py-3 rounded-lg"
        >
          <div class="flex items-center justify-between">
            <span class="text-sm font-medium"
              ><span id="selected-count">0</span> items selected</span
            >
            <div class="flex items-center gap-2">
              <button
                id="bulk-download-btn"
                class="inline-flex items-center gap-2 px-3 py-1 rounded bg-blue-600 hover:bg-blue-700 text-white text-sm"
              >
                <i class="fa-solid fa-download"></i> Download
              </button>
              <button
                id="bulk-delete-btn"
                class="inline-flex items-center gap-2 px-3 py-1 rounded bg-red-600 hover:bg-red-700 text-white text-sm"
              >
                <i class="fa-solid fa-trash"></i> Delete
              </button>
              <button
                id="bulk-move-btn"
                class="inline-flex items-center gap-2 px-3 py-1 rounded bg-purple-600 hover:bg-purple-700 text-white text-sm"
              >
                <i class="fa-solid fa-arrows-alt"></i> Move
              </button>
              <button
                id="bulk-copy-btn"
                class="inline-flex items-center gap-2 px-3 py-1 rounded bg-green-600 hover:bg-green-700 text-white text-sm"
              >
                <i class="fa-solid fa-copy"></i> Copy
              </button>
              <button
                id="clear-selection-btn"
                class="inline-flex items-center px-2 py-1 rounded hover:bg-slate-700 text-slate-300 text-sm"
              >
                Clear
              </button>
            </div>
          </div>
        </div>

        <!-- Path Navigation Bar -->
        <div
          class="flex items-center gap-2 px-4 py-3 bg-slate-900/70 border border-slate-800 rounded-lg"
        >
          <button
            id="back-btn"
            class="inline-flex items-center gap-1 px-2 py-1 rounded hover:bg-slate-700 text-slate-300"
            title="Go back"
          >
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <button
            id="home-btn"
            class="inline-flex items-center gap-1 px-2 py-1 rounded hover:bg-slate-700 text-slate-300"
            title="Go to home/root"
          >
            <i class="fa-solid fa-home"></i>
          </button>
          <div
            class="flex-1 flex items-center gap-2 px-3 py-2 bg-slate-950/50 border border-slate-700 rounded"
          >
            <i class="fa-solid fa-folder-open text-yellow-400 text-sm"></i>
            <input
              type="text"
              id="path-input"
              placeholder="Enter path (e.g., C:\, /home, .)"
              class="flex-1 bg-transparent outline-none text-sm text-slate-100 placeholder:text-slate-500"
              spellcheck="false"
            />
            <button
              id="path-go-btn"
              class="inline-flex items-center px-3 py-1 rounded bg-blue-600 hover:bg-blue-700 text-white text-xs"
            >
              Go
            </button>
          </div>
        </div>

        <!-- Breadcrumb Navigation -->
        <div
          class="flex items-center gap-2 px-4 py-3 bg-slate-900/70 border border-slate-800 rounded-lg overflow-x-auto"
        >
          <i class="fa-solid fa-folder-open text-yellow-400"></i>
          <div id="breadcrumb" class="flex items-center gap-1 text-sm"></div>
        </div>

        <!-- List Controls -->
        <div
          class="px-4 py-3 bg-slate-900/70 border border-slate-800 rounded-lg flex items-center justify-between gap-3 flex-wrap"
        >
          <div class="flex items-center gap-2 flex-wrap">
            <label for="sort-field" class="text-xs uppercase tracking-wide text-slate-400"
              >Sort</label
            >
            <select
              id="sort-field"
              class="px-2 py-1 rounded bg-slate-800 border border-slate-700 text-sm text-slate-100"
            >
              <option value="name">Name</option>
              <option value="size">Size</option>
              <option value="modified">Modified</option>
              <option value="type">Type</option>
            </select>
            <button
              id="sort-order-btn"
              class="px-3 py-1 rounded bg-slate-700 hover:bg-slate-600 text-sm text-slate-100"
              type="button"
            >
              Asc
            </button>

            <label for="filter-type" class="text-xs uppercase tracking-wide text-slate-400"
              >Filter</label
            >
            <select
              id="filter-type"
              class="px-2 py-1 rounded bg-slate-800 border border-slate-700 text-sm text-slate-100"
            >
              <option value="all">All</option>
              <option value="dirs">Folders</option>
              <option value="files">Files</option>
              <option value="images">Images</option>
              <option value="docs">Documents</option>
              <option value="archives">Archives</option>
              <option value="executables">Executables</option>
            </select>
          </div>

          <div class="flex items-center gap-2">
            <span id="file-count-summary" class="text-sm text-slate-400">0 items</span>
          </div>
        </div>

        <!-- File List -->
        <div
          id="file-list-panel"
          class="bg-slate-900/70 border border-slate-800 rounded-lg overflow-hidden"
        >
          <div
            class="file-header grid grid-cols-12 gap-3 px-4 py-3 bg-slate-800 border-b border-slate-700 text-xs font-semibold uppercase text-slate-400"
          >
            <div class="col-span-6">Name</div>
            <div class="col-span-2">Size</div>
            <div class="col-span-3">Modified</div>
            <div class="col-span-1 text-right">Actions</div>
          </div>
          <div id="file-list" class="divide-y divide-slate-800">
            <!-- Files will be inserted here -->
          </div>
        </div>
        </div>
      </div>
    </main>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu">
      <div class="context-menu-item" data-action="edit">
        <i class="fa-solid fa-edit mr-2"></i> Edit
      </div>
      <div class="context-menu-item" data-action="download">
        <i class="fa-solid fa-download mr-2"></i> Download
      </div>
      <div class="context-menu-item" data-action="zip">
        <i class="fa-solid fa-file-zipper mr-2"></i> Zip & Download
      </div>
      <div class="context-menu-item" data-action="dirsize">
        <i class="fa-solid fa-calculator mr-2"></i> Calculate Size
      </div>
      <div class="context-menu-item" data-action="copy">
        <i class="fa-solid fa-copy mr-2"></i> Copy
      </div>
      <div class="context-menu-item" data-action="move">
        <i class="fa-solid fa-arrows-alt mr-2"></i> Move
      </div>
      <div class="context-menu-item" data-action="chmod">
        <i class="fa-solid fa-lock mr-2"></i> Permissions
      </div>
      <div class="context-menu-separator" style="height:1px;background:#334155;margin:0.25rem 0;"></div>
      <div class="context-menu-item" data-action="execute">
        <i class="fa-solid fa-play mr-2"></i> Execute
      </div>
      <div class="context-menu-item" data-action="silent_execute">
        <i class="fa-solid fa-ghost mr-2"></i> Silent Execute
      </div>
      <div class="context-menu-separator" style="height:1px;background:#334155;margin:0.25rem 0;"></div>
      <div class="context-menu-item text-red-400" data-action="delete">
        <i class="fa-solid fa-trash mr-2"></i> Delete
      </div>
    </div>

    <!-- File Editor Modal -->
    <div id="file-editor-modal" class="file-editor-modal">
      <div class="file-editor-content">
        <div
          class="px-4 py-3 bg-slate-800 border-b border-slate-700 flex items-center justify-between"
        >
          <div class="flex items-center gap-3">
            <i class="fa-solid fa-file-code text-blue-400"></i>
            <span class="font-semibold" id="editor-file-name"
              >Editing File</span
            >
          </div>
          <button id="editor-close-btn" class="hover:text-red-400">
            <i class="fa-solid fa-times"></i>
          </button>
        </div>
        <div
          class="px-4 py-2 bg-slate-900 border-b border-slate-700 flex items-center justify-between gap-2"
        >
          <div class="flex items-center gap-2">
            <button
              id="editor-edit-tab"
              class="px-3 py-1 rounded bg-blue-600 text-white text-sm"
            >
              Edit
            </button>
            <button
              id="editor-preview-tab"
              class="px-3 py-1 rounded bg-slate-700 hover:bg-slate-600 text-white text-sm"
            >
              Preview
            </button>
          </div>
          <button
            id="editor-run-btn"
            class="px-3 py-1 rounded bg-green-600 hover:bg-green-700 text-white text-sm flex items-center gap-1"
            title="Execute file"
          >
            <i class="fa-solid fa-play"></i> Run
          </button>
        </div>
        <div class="flex-1 overflow-hidden p-4">
          <textarea
            id="editor-textarea"
            class="w-full h-full p-4 rounded border border-slate-700 resize-none focus:outline-none focus:border-blue-500"
            spellcheck="false"
          ></textarea>
          <pre
            id="editor-preview"
            class="w-full h-full overflow-auto rounded border border-slate-700 p-4 hidden"
          ><code id="editor-code" class="language-javascript"></code></pre>
        </div>
        <div
          class="px-4 py-3 bg-slate-800 border-t border-slate-700 flex items-center justify-between"
        >
          <div class="flex items-center gap-2 text-sm text-slate-400">
            <span id="editor-status">Ready</span>
          </div>
          <div class="flex items-center gap-2">
            <button
              id="editor-cancel-btn"
              class="px-4 py-2 rounded bg-slate-700 hover:bg-slate-600 text-white"
            >
              Cancel
            </button>
            <button
              id="editor-save-btn"
              class="px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white"
            >
              <i class="fa-solid fa-save mr-2"></i> Save
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- File Preview Modal -->
    <div id="file-preview-modal" class="file-preview-modal">
      <div class="file-preview-content">
        <div class="px-4 py-3 bg-slate-800 border-b border-slate-700 flex items-center justify-between flex-shrink-0">
          <div class="flex items-center gap-3 min-w-0">
            <i class="fa-solid fa-eye text-blue-400 flex-shrink-0"></i>
            <span class="font-semibold truncate" id="preview-file-name">Preview</span>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0 ml-2">
            <button
              id="preview-download-btn"
              class="inline-flex items-center gap-2 px-3 py-1.5 rounded bg-blue-600 hover:bg-blue-700 text-white text-sm"
              title="Download file"
            >
              <i class="fa-solid fa-download"></i> Download
            </button>
            <button
              id="preview-close-btn"
              class="px-2 py-1 rounded hover:text-red-400 text-slate-400 transition-colors"
              title="Close preview"
            >
              <i class="fa-solid fa-times"></i>
            </button>
          </div>
        </div>
        <div id="preview-content">
          <!-- Image or PDF will be rendered here -->
        </div>
        <div id="preview-status" class="px-4 py-2 text-sm text-slate-400 text-center flex-shrink-0"></div>
      </div>
    </div>

    <!-- Transfer Progress Panel -->
    <div
      id="transfer-panel"
      class="hidden fixed bottom-4 right-4 w-96 max-w-full bg-slate-900 border border-slate-700 rounded-lg shadow-2xl overflow-hidden z-50"
    >
      <div
        class="px-4 py-3 bg-slate-800 border-b border-slate-700 flex items-center justify-between"
      >
        <div class="flex items-center gap-2">
          <i class="fa-solid fa-arrow-up-arrow-down"></i>
          <span class="font-semibold">File Transfers</span>
        </div>
      </div>
      <div id="transfer-list" class="p-3 max-h-96 overflow-y-auto space-y-2">
        <!-- Transfer items will be added here -->
      </div>
    </div>

    <!-- Upload Modal -->
    <input type="file" id="file-input" style="display: none" multiple />

    <script type="module" src="/assets/nav.js"></script>
    <script type="module" src="/assets/filebrowser.js?v=iconsthumbs-20260517-1"></script>
  </body>
</html>
