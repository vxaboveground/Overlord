<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Logs - Overlord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/tailwind.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="/assets/main.css" />
    <script src="/assets/toast.js"></script>
    <script src="/assets/ripple.js"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header id="top-nav"></header>

    <main class="px-5 py-6">
      <div class="max-w-7xl mx-auto flex flex-col gap-6">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div>
            <h1 class="text-2xl font-semibold">Client Connection Logs</h1>
            <p class="text-slate-400">
              Track first connects, reconnects, uninstalls, and disconnects.
            </p>
          </div>
          <div class="text-sm text-slate-400">
            Updated: <span id="last-update">Never</span>
          </div>
        </div>

        <section class="bg-slate-900/70 border border-slate-800 rounded-lg p-4">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="flex flex-col gap-2">
              <label class="text-xs text-slate-400" for="client-filter">
                Client ID
              </label>
              <input
                id="client-filter"
                type="text"
                placeholder="Search client id"
                class="w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800 text-slate-100"
              />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-xs text-slate-400" for="start-date">
                Start
              </label>
              <input
                id="start-date"
                type="datetime-local"
                class="w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800 text-slate-100"
              />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-xs text-slate-400" for="end-date">
                End
              </label>
              <input
                id="end-date"
                type="datetime-local"
                class="w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800 text-slate-100"
              />
            </div>
            <div class="flex items-end gap-2">
              <button
                id="refresh-btn"
                class="px-4 py-2 rounded-lg bg-indigo-600/70 hover:bg-indigo-600 border border-indigo-500 text-indigo-100"
              >
                <i class="fa-solid fa-rotate"></i> Refresh
              </button>
            </div>
          </div>

          <div class="mt-4 flex flex-wrap gap-2" id="action-filters">
            <label class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-950/70 border border-slate-800 text-sm">
              <input type="checkbox" class="action-checkbox" value="client_first_connect" checked />
              <span class="text-emerald-300">First Connect</span>
            </label>
            <label class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-950/70 border border-slate-800 text-sm">
              <input type="checkbox" class="action-checkbox" value="client_reconnect" checked />
              <span class="text-blue-300">Reconnect</span>
            </label>
            <label class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-950/70 border border-slate-800 text-sm">
              <input type="checkbox" class="action-checkbox" value="client_disconnect" checked />
              <span class="text-orange-300">Disconnect</span>
            </label>
            <label class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-950/70 border border-slate-800 text-sm">
              <input type="checkbox" class="action-checkbox" value="uninstall" checked />
              <span class="text-rose-300">Uninstall</span>
            </label>
          </div>
        </section>

        <section class="bg-slate-900/70 border border-slate-800 rounded-lg p-4">
          <div id="logs-container" class="space-y-3"></div>
          <div
            id="logs-empty"
            class="hidden text-center text-slate-500 py-10"
          >
            <i class="fa-solid fa-inbox text-4xl mb-3"></i>
            <p>No log entries found.</p>
          </div>
          <div class="mt-4 flex items-center justify-between text-sm">
            <button
              id="prev-page"
              class="px-3 py-2 rounded-lg bg-slate-800/70 border border-slate-700 text-slate-200 disabled:opacity-40"
            >
              <i class="fa-solid fa-arrow-left"></i> Previous
            </button>
            <div id="page-info" class="text-slate-400">Page 1</div>
            <button
              id="next-page"
              class="px-3 py-2 rounded-lg bg-slate-800/70 border border-slate-700 text-slate-200 disabled:opacity-40"
            >
              Next <i class="fa-solid fa-arrow-right"></i>
            </button>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="/assets/nav.js"></script>
    <script src="/assets/logs.js"></script>
  </body>
</html>
